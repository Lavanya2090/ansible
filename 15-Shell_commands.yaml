- name: commnad vs shell
  hosts: local
  connection: local
  tasks:
  - name: commnad module test
    #ansible.builtin.command: cat /etc/passwd/ | grep root #since commnad doesnt support pipe and redirection go for shll
    ansible.builtin.shell: cat /etc/passwd/ | grep root
    register: cat_output

  - name: print output
    ansible.builtin.debug:
      msg: "{{cat_output}}"
      
  - name: commnad module test
    ansible.builtin.shell: ls - ltr > files.txt
    register: files_output 

  - name: print output
    ansible.builtin.debug:
      msg: "{{files_output}}"