- name: Gathering facts
  hosts: local
  connection: local
  tasks:
  - name: print facts
    ansible.builtin.debug:
      msg: "{{ ansible_facts }}"

  - name: check Redhat or not
      ansible.builtin.debug:  
        msg: "This is Redhat server"
      when: ansible_facts.os_family == "RedHat"

  - name: check if the server is ubuntu
      ansible.builtin.debug:  
        msg: "This is ubuntu server"
      when: ansible_facts.os_family == "Debian"    


      #ansible_facts is a variable that contains all the facts about the system. It is a dictionary that contains all the facts about the system. We can use this variable to access any fact about the system. In this playbook, we are using the debug module to print all the facts about the system. The output will be a dictionary that contains all the facts about the system.